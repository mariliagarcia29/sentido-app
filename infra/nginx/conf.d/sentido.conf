# ── Redireciona HTTP → HTTPS ────────────────────────────────
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# ── API Backend ─────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name api.sentido.app;

  ssl_certificate     /etc/letsencrypt/live/api.sentido.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.sentido.app/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_stapling        on;
  ssl_stapling_verify on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # WebSocket (Socket.IO chat)
  location /socket.io/ {
    proxy_pass         http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Rotas de autenticação — rate limit agressivo
  location ~ ^/api/v1/auth/(login|register) {
    limit_req  zone=auth_limit burst=5 nodelay;
    limit_conn conn_limit 10;
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API REST — rate limit padrão
  location /api/ {
    limit_req  zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 20;
    proxy_pass         http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_buffering    off;
  }

  # Health check — sem rate limit
  location /api/v1/health {
    proxy_pass http://api:3001;
    access_log off;
  }
}

# ── Frontend Web ─────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name sentido.app www.sentido.app;

  ssl_certificate     /etc/letsencrypt/live/sentido.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sentido.app/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;

  # Proxy para o container web (docker-compose) ou fallback local
  location / {
    proxy_pass         http://web:80;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
